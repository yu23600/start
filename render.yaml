services:
  - type: web
    name: cafeteria-recommender
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT deploy_app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: cafeteria-data
      mountPath: /data
      sizeGB: 1
