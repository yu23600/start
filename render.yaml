# v4 - update 宁德师范学院 & 福建医科大学 dish data (2025 verified)
services:
  - type: web
    name: cafeteria-recommender
    runtime: python
    plan: free
    buildCommand: pip install -r chimei/requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT chimei.deploy_app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
